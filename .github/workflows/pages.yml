name: Deploy demo to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @fhir-place/react-fhir build
      - name: Build demo for GitHub Pages (live HAPI R4)
        run: pnpm --filter @fhir-place/demo build
        env:
          VITE_USE_MOCK: "false"
          VITE_FHIR_BASE_URL: "https://hapi.fhir.org/baseR4"
          VITE_BASE_PATH: "/${{ github.event.repository.name }}/"
      - name: SPA 404 fallback
        run: cp apps/demo/dist/index.html apps/demo/dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
