name: Post-merge TASKS sync

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  update-tasks:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'fhir-workbench-phase-a')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Update TASKS.md done list
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: node .github/scripts/update-tasks-after-merge.mjs
      - name: Commit TASKS.md update
        run: |
          if git diff --quiet; then
            echo "No TASKS updates needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/workbench/TASKS.md
          git commit -m "docs(workbench): sync TASKS done for #${{ github.event.pull_request.number }}"

          # Rebase on remote main before pushing so concurrent merges don't
          # cause non-fast-forward rejections. Retry with backoff if another
          # run pushes between our pull and our push.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "Push attempt $attempt failed; retrying after backoff"
            sleep $((attempt * 2))
          done

          echo "Failed to sync TASKS.md after 5 attempts" >&2
          exit 1
