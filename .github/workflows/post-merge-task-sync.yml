name: Post-merge TASKS sync

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  update-tasks:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'fhir-workbench-phase-a')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Update TASKS.md done list
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: node .github/scripts/update-tasks-after-merge.mjs
      - name: Commit TASKS.md update
        run: |
          if git diff --quiet; then
            echo "No TASKS updates needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/workbench/TASKS.md
          git commit -m "docs(workbench): sync TASKS done for #${{ github.event.pull_request.number }}"
          git push
