# Hourly engineer-dispatch routine. :)
#
# Picks up to 3 ready issues from the backlog, hands each to the engineer
# subagent (.claude/agents/engineer.md), opens draft PRs, and updates a
# rolling tracking issue. Mirrors the daily-pm-triage workflow's shape.
#
# Setup required (one-time):
#   1. ANTHROPIC_API_KEY already exists in repo secrets (used by the PM
#      workflow). No new secret to add.
#   2. Branch protection on `main` must require:
#        - PR before merge
#        - Required status checks: test, e2e
#        - Block force-push and deletion
#      The agent only opens drafts; humans approve and merge.
#   3. (Recommended) `.github/CODEOWNERS` so bot draft PRs auto-route
#      to the right human reviewer.
#   4. Open one tracking issue manually titled exactly
#      `Engineer dispatch — hourly report`. The bot will populate it.
#   5. Cron is enabled at a daily cadence (15:05 UTC = 11:05 ET) so runs
#      land inside Daniel's work day. workflow_dispatch is preserved for
#      manual triggers. Despite the name, this workflow is daily — the
#      file/prompt rename is a separate follow-up.

name: Hourly engineer dispatch

on:
  # Daily cadence (not hourly, despite the workflow name). 15:05 UTC =
  # 11:05 ET, inside Daniel's work day so he can see runs land.
  # workflow_dispatch is preserved alongside the schedule so manual
  # triggers still work.
  schedule:
    - cron: "5 15 * * *"   # 11:05 ET, daily
  workflow_dispatch:

permissions:
  contents: write       # push bot/* branches only — main is protected
  issues: write         # claim labels, comment on issues
  pull-requests: write  # open and comment on draft PRs (NOT merge — branch protection enforces)
  id-token: write       # required by claude-code-action@v1 (matches daily-pm-triage)

concurrency:
  group: hourly-engineer-dispatch
  cancel-in-progress: false   # never cancel mid-PR-creation

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 90    # 3 tickets × ~25 min budget + overhead
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git worktree from inside the action

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run Claude Code with the dispatcher prompt
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Mirror the daily-pm-triage pattern: tell Claude to read the
          # prompt file itself rather than slurping it into a workflow
          # input. The dispatcher orchestrates only; the engineer subagent
          # does all editing under its own hard rules (defense in depth).
          prompt: |
            Read the file at docs/prompts/hourly-engineer-dispatch.md and
            execute the instructions in it. Do not modify the prompt file
            itself. The MCP github tools are already configured and the
            engineer subagent at .claude/agents/engineer.md is available
            for dispatch.
          # 3 tickets × full TDD loop (typecheck/test/e2e iterations) per
          # subagent invocation needs more turns than the PM routine. Cap
          # at 300 — the workflow timeout-minutes is the real wall-clock
          # bound; this just prevents pathological loops from racing it.
          #
          # --allowedTools: the action's default tool set is conservative
          # and excludes Bash, Edit, Write, and Agent. Without this flag
          # the dispatcher cannot spawn the engineer subagent or do any
          # of its git/PR work — every call returns a permission denial
          # (run 25584355918 hit 8 denials and accomplished nothing).
          # Mirrors the local driver at scripts/dispatch-engineer.sh
          # (line 68). Verified flag spelling against the action's docs
          # at docs/configuration.md (camelCase, not --allowed-tools).
          # Defense in depth: the engineer subagent enforces its own
          # hard rules; this just bounds what a prompt-injected
          # dispatcher can call.
          #
          # --disallowedTools: AskUserQuestion has no responder in a
          # headless workflow — both prior manual runs (May 8 + May 9)
          # terminated as no-ops because the model called it to
          # disambiguate between the `mcp__github__*` and `gh`-via-Bash
          # paths and got no answer. ExitPlanMode is a similar dead-end
          # here. The dispatcher prompt's hard-rules section also tells
          # the agent never to call these (defense in depth in case the
          # flag spelling changes upstream).
          claude_args: "--max-turns 300 --allowedTools Read,Edit,Write,Bash,Grep,Glob,Agent,mcp__github__* --disallowedTools AskUserQuestion,ExitPlanMode"
          # Temporary: show full output until 5–10 successful manual runs
          # (per workflow's own setup notes). Remove once cron is enabled.
          show_full_output: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
