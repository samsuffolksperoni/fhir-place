# Continuously rebuilds the `staging` branch as:
#
#   staging = origin/main + every open PR with reviewDecision == APPROVED,
#             merged in PR-number order
#
# This is the validation environment behind `/staging/`. PRs target `main`
# (not staging); after a CODEOWNER approves the PR, this workflow stacks
# the PR's head onto staging and force-pushes, which triggers `pages.yml`
# to redeploy `/staging/`. UAT walks the live staging URL with the PR's
# content available alongside other approved-in-flight PRs.
#
# Staging has no branch protection — it's a deploy artifact, not a
# source-of-truth branch. Each rebuild force-resets from main HEAD.
# Clean merges are handled here. If a PR conflicts with the current staging
# stack, this workflow dispatches the agent resolver to make the integration
# judgment in the staging artifact instead of silently skipping the PR.
#
# Triggers:
#   - pull_request_review: submitted | dismissed
#     → approval state may have changed; rebuild
#   - pull_request: closed | reopened | synchronize
#     → an approved PR was merged / closed, or got new commits
#   - push to main
#     → main advanced; rebuild from new HEAD so direct-to-main commits
#       propagate to /staging/ automatically (no separate sync needed)
#
# Concurrency: one rebuild at a time. Rapid events coalesce.

name: Stack approved PRs onto staging

on:
  pull_request_review:
    types: [submitted, dismissed]
  pull_request:
    types: [closed, reopened, synchronize]
  push:
    branches: [main]

permissions:
  contents: write # force-push staging
  actions: write # dispatch the agent resolver when a merge conflict needs judgment
  issues: write # comment on PRs when conflict resolution is dispatched
  pull-requests: write # edit `uat:` labels after stacking

concurrency:
  group: stack-approved-prs
  cancel-in-progress: true

jobs:
  # Preflight: refuse to run when the workflow file at the triggering ref
  # differs from main's. GitHub will run a workflow added in a PR branch
  # when the PR receives a pull_request_review or pull_request event —
  # so a workflow that mutates a shared ref like `staging` can fire from
  # an unmerged PR branch and wreck production. This job blob-compares
  # the workflow file: if the running ref's version of
  # `stack-approved-prs.yml` is byte-identical to main's, we trust it
  # and proceed; if a PR modified the workflow, we skip until that PR
  # merges.
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      safe: ${{ steps.check.outputs.safe }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          sparse-checkout: |
            .github/workflows/stack-approved-prs.yml
          sparse-checkout-cone-mode: false
      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f .github/workflows/stack-approved-prs.yml ]; then
            echo "::warning::Workflow file doesn't exist at the triggering ref; skipping."
            echo "safe=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RUNNING_HASH=$(git hash-object .github/workflows/stack-approved-prs.yml)
          MAIN_HASH=$(gh api "repos/$GITHUB_REPOSITORY/contents/.github/workflows/stack-approved-prs.yml?ref=main" --jq '.sha')
          if [ "$RUNNING_HASH" = "$MAIN_HASH" ]; then
            echo "safe=true" >> "$GITHUB_OUTPUT"
            echo "Workflow file at triggering ref matches main — proceeding."
          else
            echo "::warning::Workflow file at triggering ref differs from main (running: $RUNNING_HASH vs main: $MAIN_HASH). Skipping to avoid running an unreviewed staging-rebuild script."
            echo "safe=false" >> "$GITHUB_OUTPUT"
          fi

  rebuild:
    needs: preflight
    if: needs.preflight.outputs.safe == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Find open approved PRs targeting main
        id: prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # `reviewDecision: APPROVED` means a CODEOWNER approval is present
          # and no "request changes" review is outstanding (main's ruleset
          # requires CODEOWNER review). PR-number sort keeps the merge
          # order stable across runs.
          PRS=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state open --base main \
            --json number,headRefName,headRepositoryOwner,reviewDecision \
            --jq '[.[] | select(.reviewDecision == "APPROVED") | {number, head: .headRefName, owner: .headRepositoryOwner.login}] | sort_by(.number)')
          # Compact one-line JSON for GITHUB_OUTPUT; expand for the human log.
          ONE_LINE=$(echo "$PRS" | jq -c .)
          echo "prs=$ONE_LINE" >> "$GITHUB_OUTPUT"
          echo "Approved PRs to stack onto staging:"
          echo "$PRS" | jq -r '.[] | "  #\(.number) [\(.owner)/\(.head)]"'
          echo "count=$(echo "$PRS" | jq 'length')" >> "$GITHUB_OUTPUT"

      - name: Rebuild staging from main + approved PRs
        env:
          PRS: ${{ steps.prs.outputs.prs }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Reset staging to main HEAD. Any prior staging history is
          # discarded — this branch is a deploy artifact, not source of
          # truth.
          git checkout -B staging origin/main

          # Stack each approved PR by merging its head into staging. If a
          # conflict appears, hand the full staging rebuild to the agent
          # resolver; it can preserve both sides' intent in the deploy
          # artifact, or escalate when a human decision is actually needed.
          CONFLICT_DISPATCHED=0
          while read -r pr; do
            NUM=$(echo "$pr" | jq -r '.number')
            HEAD=$(echo "$pr" | jq -r '.head')
            OWNER=$(echo "$pr" | jq -r '.owner')
            echo "::group::Stacking PR #$NUM ($OWNER/$HEAD)"
            # Same-repo PRs use a local ref; fork PRs need the head fetched
            # via the PR's refspec on the upstream (`pull/<N>/head`).
            if [ "$OWNER" = "${GITHUB_REPOSITORY%%/*}" ]; then
              git fetch origin "$HEAD"
              REF="origin/$HEAD"
            else
              git fetch origin "pull/$NUM/head:pr-$NUM"
              REF="pr-$NUM"
            fi
            REF_SHA=$(git rev-parse "$REF")
            if git merge --no-edit --no-ff -m "stage: include PR #$NUM" "$REF"; then
              echo "Stacked PR #$NUM"
              # Transition the PR's UAT state: it's now on staging, awaiting
              # the hourly UAT walker. The script handles the `uat: skip`
              # short-circuit and the requested/stale label cleanup. It is
              # runtime-agnostic — same invocation works from GHA, launchd,
              # tmux, or a cloud webhook receiver.
              node scripts/staging/transition-uat-label.mjs "$NUM"
            else
              echo "::warning::PR #$NUM conflicts with staging; dispatching agent resolver."
              git merge --abort
              MARKER="<!-- staging-stack-agent-dispatch pr=$NUM sha=$REF_SHA -->"
              if gh pr view "$NUM" --repo "$GITHUB_REPOSITORY" --json comments --jq '.comments[].body' | grep -Fq "$MARKER"; then
                echo "Agent resolver comment already exists for PR #$NUM at $REF_SHA"
              else
                BODY=$(printf '%s\n\n%s\n\n%s\n\n%s' \
                  "$MARKER" \
                  "Staging stack hit a merge conflict for this PR at \`$REF_SHA\`." \
                  "The clean-merge path is handing this to the staging agent resolver instead of skipping the PR. The resolver rebuilds \`staging\` from \`origin/main\` plus the approved PR stack, resolves hand-authored conflicts in the staging artifact when it can preserve both sides' intent, and pushes \`staging\` for UAT." \
                  "If the resolver finds a binary/generated conflict or an ambiguous product decision, it will stop and escalate to @danielsperoni with the files that need human judgment.")
                gh pr comment "$NUM" --repo "$GITHUB_REPOSITORY" --body "$BODY"
              fi
              if ! gh workflow run staging-stack-agent.yml \
                --repo "$GITHUB_REPOSITORY" \
                --ref main \
                -f conflict_pr="$NUM" \
                -f conflict_sha="$REF_SHA"; then
                gh pr comment "$NUM" --repo "$GITHUB_REPOSITORY" --body "@danielsperoni staging conflict resolver dispatch failed for \`$REF_SHA\`. The PR is still not on staging and needs human intervention."
                exit 1
              fi
              CONFLICT_DISPATCHED=1
              echo "::endgroup::"
              break
            fi
            echo "::endgroup::"
          done < <(echo "$PRS" | jq -c '.[]')

          if [ "$CONFLICT_DISPATCHED" = "1" ]; then
            echo "Agent resolver dispatched; staging push deferred to staging-stack-agent.yml."
            exit 0
          fi

          # Force-push (staging is unprotected; this is its definition).
          # `--force-with-lease` so concurrent rebuilds don't silently
          # clobber each other — concurrency:cancel-in-progress already
          # cancels the prior run, but this is belt and suspenders.
          git push --force-with-lease origin staging
